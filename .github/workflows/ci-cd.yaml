name: CI/CD

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}

jobs:
  api:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/publish-dokploy-app.yaml
    secrets: inherit
    permissions:
      contents: read
      actions: write
      packages: write
    with:
      project: commentvia-api
      sentry-dsn: ${{ vars.COMMENTVIA_API_SENTRY_DSN }}
      dokploy-app-id: ${{ vars.COMMENTVIA_API_DOKPLOY_APP_ID }}

  website:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
      - name: Build website
        env:
          REQUIRE_PROD_URLS: "true"
          VITE_API_URL: https://api.commentvia.com
          VITE_APP_URL: https://app.commentvia.com
          VITE_COMMENTVIA_LOCAL: "false"
          VITE_WEBSITE_URL: https://commentvia.com
        run: bun run build:website
      - name: Verify website build artifacts
        env:
          REQUIRE_PROD_URLS: "true"
        run: bun scripts/verify-prod-build.ts --website
      - name: Deploy website
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.COMMENTVIA_WEBSITE_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          mkdir -p /tmp/commentvia-website
          rsync -a --delete apps/website/dist/ /tmp/commentvia-website/
          mkdir -p /tmp/commentvia-website/.vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > /tmp/commentvia-website/.vercel/project.json
          cd /tmp/commentvia-website
          bunx --bun vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

  app:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
      - name: Build app
        env:
          REQUIRE_PROD_URLS: "true"
          VITE_API_URL: https://api.commentvia.com
          VITE_APP_URL: https://app.commentvia.com
          VITE_COMMENTVIA_LOCAL: "false"
          VITE_WEBSITE_URL: https://commentvia.com
        run: bun run build:app
      - name: Verify app build artifacts
        env:
          REQUIRE_PROD_URLS: "true"
        run: bun scripts/verify-prod-build.ts --app
      - name: Deploy app
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.COMMENTVIA_APP_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          mkdir -p /tmp/commentvia-app
          rsync -a --delete apps/spa/build/client/ /tmp/commentvia-app/
          printf '{"rewrites":[{"source":"/(.*)","destination":"/index.html"}]}\n' > /tmp/commentvia-app/vercel.json
          mkdir -p /tmp/commentvia-app/.vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > /tmp/commentvia-app/.vercel/project.json
          cd /tmp/commentvia-app
          bunx --bun vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

  verify-production:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [api, website, app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
      - name: Verify production domains
        run: bun run verify:prod
