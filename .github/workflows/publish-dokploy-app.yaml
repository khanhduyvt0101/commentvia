name: Publish Dokploy app

on:
  workflow_call:
    secrets:
      DOKPLOY_API_KEY:
        required: true
    inputs:
      project:
        type: string
        required: true
      dokploy-app-id:
        type: string
        required: true

jobs:
  prepare:
    name: Prepare Docker context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
      - name: Prepare API Docker context
        run: bun run docker:api:prepare
      - uses: actions/upload-artifact@v4
        with:
          name: docker-context
          path: apps/api/dist/*_docker.tar.gz
          retention-days: 1

  publish-docker-image:
    name: Publish Docker image
    needs: [prepare]
    uses: ./.github/workflows/publish-docker-image.yaml
    secrets: inherit
    with:
      project: ${{ inputs.project }}

  trigger-dokploy-deployment:
    name: Trigger Dokploy deployment
    needs: [publish-docker-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/trigger-dokploy-deployment
        with:
          api-key: ${{ secrets.DOKPLOY_API_KEY }}
          app-id: ${{ inputs.dokploy-app-id }}
