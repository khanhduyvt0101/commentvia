name: Validate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/prepare
      - name: Check release plan
        run: bun --bun changeset status --since=origin/main
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build
      - name: Prepare API Docker context
        run: bun run docker:api:prepare
