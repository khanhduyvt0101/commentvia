name: Validate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/prepare
      - name: Check release plan
        run: bun --bun changeset status --since=origin/main
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        env:
          REQUIRE_PROD_URLS: "true"
          VITE_API_URL: https://api.commentvia.com
          VITE_APP_URL: https://app.commentvia.com
          VITE_COMMENTVIA_LOCAL: "false"
          VITE_WEBSITE_URL: https://commentvia.com
        run: bun run build
      - name: Verify production build artifacts
        env:
          REQUIRE_PROD_URLS: "true"
        run: bun run verify:build
      - name: Prepare API Docker context
        run: bun run docker:api:prepare
