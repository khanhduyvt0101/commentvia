name: Publish Docker image

on:
  workflow_call:
    inputs:
      project:
        type: string
        required: true
      sentry-dsn:
        type: string
        default: ""

jobs:
  publish-docker-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: actions/checkout@v6
        with:
          sparse-checkout: apps/api/package.json
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v4
        with:
          name: docker-context
      - run: tar -xzf ./*_docker.tar.gz
      - id: version
        run: echo "version=$(jq -r .version apps/api/package.json)" >> "$GITHUB_OUTPUT"
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.project }}
          tags: type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=${{ inputs.project }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
      - uses: docker/build-push-action@v6
        with:
          context: docker/
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            SENTRY_DSN=${{ inputs.sentry-dsn }}
            SENTRY_RELEASE=${{ inputs.project }}@${{ steps.version.outputs.version }}
            SENTRY_DIST=docker-${{ github.run_id }}-${{ github.run_attempt }}
            SENTRY_ENVIRONMENT=docker-production
          cache-from: type=gha,scope=${{ inputs.project }}
          cache-to: type=gha,mode=max,scope=${{ inputs.project }}
      - uses: geekyeggo/delete-artifact@v5
        with:
          name: docker-context
