name: Prepare
description: Set up Bun, install dependencies, and run the repository formatter check.

runs:
  using: composite
  steps:
    - uses: fregante/setup-git-user@v2
    - uses: oven-sh/setup-bun@v2
    - name: Cache Bun dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          node_modules
          apps/*/node_modules
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-
    - shell: bash
      run: bun install --frozen-lockfile
    - shell: bash
      run: bun --bun biome check --no-errors-on-unmatched .
